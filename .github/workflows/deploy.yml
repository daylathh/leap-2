# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  # Cho phép kích hoạt thủ công từ giao diện GitHub Actions
  workflow_dispatch:

# Quyền hạn cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Ngăn chạy đè các tiến trình cũ khi có code mới được cập nhật liên tục
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cài đặt Dependencies
        run: npm install

      - name: Build ứng dụng static
        run: npm run build

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
